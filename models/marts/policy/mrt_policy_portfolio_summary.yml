version: 2

models:
  - name: mrt_policy_portfolio_summary
    description: >
      Table mart fournissant un résumé mensuel des indicateurs clés (KPI) du portefeuille d’assurance.
      Les clés de dimension (product_id, insured_gender, insured_region, insured_age_group)
      permettent une modélisation en étoile dans Power BI ou tout autre outil BI.

    columns:
      - name: product_id
        description: "Identifiant du produit. Utilisé pour les jointures avec la dimension produit."
        tests:
          - not_null

      - name: insured_gender
        description: "Genre de l’assuré. Clé de dimension."
        tests:
          - not_null

      - name: insured_region
        description: "Région de l’assuré. Clé de dimension."
        tests:
          - not_null

      - name: insured_age_group
        description: "Tranche d’âge de l’assuré. Clé de dimension."
        tests:
          - not_null

      - name: year
        description: "Année durant laquelle la prime ou le sinistre a été enregistré."
        tests:
          - not_null

      - name: month
        description: "Mois durant lequel la prime ou le sinistre a été enregistré."
        tests:
          - not_null

      - name: policy_count
        description: "Nombre de contrats ayant une prime enregistrée pour l’année/mois donné."
        tests:
          - not_null

      - name: total_premium
        description: "Montant total des primes pour l’année/mois donné."
        tests:
          - not_null

      - name: total_claim
        description: "Montant total des sinistres pour l’année/mois donné."
        tests:
          - not_null

      - name: claim_count
        description: "Nombre total de sinistres pour l’année/mois donné."

      - name: loss_ratio
        description: "Ratio de sinistralité = total_claim / total_premium."

      - name: frequency
        description: "Fréquence des sinistres = claim_count / policy_count."

      - name: severity
        description: "Sévérité des sinistres = total_claim / claim_count."

      - name: premium_per_policy
        description: "Prime moyenne par contrat = total_premium / policy_count."

      - name: claim_per_policy
        description: "Sinistre moyen par contrat = total_claim / policy_count."
