version: 2

models:
  - name: mrt_policy_status_timeline
    description: >
      Timeline mensuelle de l’évolution du statut des contrats.
      Aucune donnée financière n’est incluse. Permet d’analyser le cycle de vie des contrats.

    columns:
      - name: policy_id
        description: "Identifiant du contrat."
        tests:
          - not_null

      - name: year
        description: "Année de l’observation."
        tests:
          - not_null

      - name: month
        description: "Mois de l’observation."
        tests:
          - not_null

      - name: product_id
        description: "Produit associé au contrat."

      - name: insured_gender
        description: "Genre de l’assuré."

      - name: insured_region
        description: "Région de l’assuré."

      - name: insured_age_group
        description: "Tranche d’âge de l’assuré."

      - name: policy_status
        description: "Statut du contrat pour l’année/mois donné."
