version: 2

models:
  - name: stg_insureds
    description: "Staging layer for insured data. 1 row per insured_id."
    columns:
      - name: insured_id
        tests:
          - unique
          - not_null
      - name: name
        tests:
          - not_null
          
      - name: gender
        tests:          
          - not_null
          - accepted_values:
              values: ['M', 'F', 'Other']
      - name: birth_date
        tests:
          - not_null
      - name: region
        tests:
          - not_null