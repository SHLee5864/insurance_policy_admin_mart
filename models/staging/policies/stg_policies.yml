version: 2

models:
  - name: stg_policies
    description: "Staging layer for policy data. 1 row per policy_id."
    columns:
      - name: policy_id
        tests:
          - unique
          - not_null
      - name: insured_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null          
          
      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'cancelled', 'expired', 'pending']
      - name: effective_date
        tests:
          - not_null
      - name: expiry_date
        tests:
          - not_null
      - name: updated_at
        tests:
          - not_null

    tests:
      - expiry_date_after_effective_date
      - updated_at_after_effective_date