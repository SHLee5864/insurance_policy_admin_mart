version: 2

models:
  - name: stg_policy_status_history
    description: "Staging layer for policy status history data. 1 row per policy_id."
    columns:
      - name: policy_id
        tests:
          - not_null

      - name: status
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'cancelled', 'expired', 'pending']
      - name: start_date
        tests:
          - not_null
      - name: end_date

      - name: updated_at
        tests:
          - not_null

    tests:
      - end_date_after_start_date