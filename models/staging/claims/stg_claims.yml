version: 2

models:
  - name: stg_claims
    description: "Staging layer for claim data. 1 row per claim_id."
    columns:
      - name: claim_id
        tests:
          - not_null
          - unique

      - name: policy_id
        tests:
          - not_null
          - relationships:
                to: ref('stg_policies')
                field: policy_id

      - name: claim_amount
        tests:
          - not_null

      - name: claim_date
        tests:
          - not_null

      - name: claim_type
        tests:
          - not_null
          
      - name: claim_status
        tests:
          - not_null