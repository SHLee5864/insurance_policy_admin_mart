version: 2

models:
  - name: int_policy_coverages
    description: "Intermediate layer for the policy coverages data."
    columns:
      - name: policy_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: coverage_id

      - name: coverage_type
        tests:
          - not_null
      - name: coverage_limit
        tests:
          - not_null
      - name: deductible
        tests:
          - not_null
