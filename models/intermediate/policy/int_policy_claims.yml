version: 2

models:
  - name: int_policy_claims
    description: "Intermediate layer for the policy claims data."
    columns:
      - name: policy_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: claim_amount
        tests:
          - not_null
      - name: claim_year
        tests:
          - not_null
      - name: claim_month
        tests:
          - not_null
      - name: claim_type
        tests:
          - not_null
      - name: claim_status
        tests:
          - not_null