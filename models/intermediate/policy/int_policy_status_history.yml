version: 2

models:
  - name: int_policy_status_history
    description: "Intermediate layer for the policy status history data."
    columns:
      - name: policy_id
        tests:
          - unique
          - not_null

      - name: policy_status
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'cancelled', 'expired', 'pending']
      - name: start_date
        tests:
          - not_null
      - name: end_date
        tests:
          - dbt_utils.expression_is_true:
              expression: "end_date >= start_date"
      - name: updated_at
        tests:
          - not_null