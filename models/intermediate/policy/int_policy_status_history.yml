version: 2

models:
  - name: int_policy_status_history
    description: "Intermediate layer for the policy status history data."
    columns:
      - name: policy_id
        tests:
          - not_null

      - name: policy_status
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'cancelled', 'expired', 'pending']
      - name: start_date
        tests:
          - not_null
      - name: end_date

      - name: updated_at
        tests:
          - not_null

    tests:
      - end_date_after_start_date